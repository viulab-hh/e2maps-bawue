<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>e2maps design | Landtagswahl Baden-Württemberg</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f6f6f6;
      color: #111;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    .wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px;
      box-sizing: border-box;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 1300px; /* initial fallback */
      border: 0;
      display: block;
      overflow: hidden;
    }

    @media (max-width: 480px) {
      .wrap { padding: 8px; }
      .card { border-radius: 10px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <iframe
        id="obs-embed"
        src="https://observablehq.com/embed/0d557595a4f1177a@759?cells=chartCK%2Cviewof+display"
        loading="lazy"
        allow="fullscreen"
      ></iframe>
    </div>
  </div>

  <script>
    const iframe = document.getElementById("obs-embed");

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "observablehq:height") {
        iframe.style.height = `${event.data.value}px`;
      }
    });
  </script>
</body>
</html>
