<!doctype html>
<html lang="de">
<head>

  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:#f6f6f6;
      color:#111;
    }
    .wrap{
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
    }
    .card{
      background:#fff;
      border-radius:14px;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
      overflow:hidden;
    }
    iframe{
      width:100%;
      border:0;
      display:block;
      /* Mobile: nicht “zu hoch” starten, aber groß genug */
      min-height: 70vh;
      height: 1184px; /* fallback */
    }

    /* Optional: auf sehr kleinen Screens etwas weniger Außenrand */
    @media (max-width: 480px){
      .wrap{ padding: 8px; }
      .card{ border-radius: 10px; }
      iframe{ min-height: 75vh; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <iframe
        src="https://observablehq.com/embed/0d557595a4f1177a@756?cells=chartCK%2Cviewof+display"
        loading="lazy"
        allow="fullscreen"
      ></iframe>
    </div>
  </div>

</html>
